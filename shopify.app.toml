# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "990811474e0178a5bc27625d7eff53de"
name = "API token Manager"
application_url = "https://dtc-api-token-manager.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_customers,read_inventory,write_inventory,unauthenticated_read_product_listings,unauthenticated_read_content,unauthenticated_read_metaobjects,write_fulfillments,write_draft_orders"
[auth]
redirect_urls = [ "https://dtc-api-token-manager.vercel.app/api/auth" ]
